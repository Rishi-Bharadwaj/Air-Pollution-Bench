# Paths relative to this file's location
time_repo: .                     # path to the TIME repo (contains experiments/)
data_dir: ./data/hf_dataset     # where converted HF Arrow datasets live (= TIME_DATASET)
datasets_config: aq_datasets.yaml   # your dataset config (test/val/prediction lengths)

# Models and their dependencies
models:

  chronos_bolt:
    script: experiments/chronos_bolt.py
    packages:
      - chronos-forecasting
    args:
      context_length: 168

  chronos2:
    script: experiments/chronos2.py
    packages:
      - chronos-forecasting
    args:
      context_length: 168

  moirai:
    script: experiments/moirai.py
    packages:
      - uni2ts
    args:
      context_length: 168

  moirai2:
    script: experiments/moirai2.py
    packages:
      - uni2ts
    args:
      model_size: small   # only size currently released for moirai-2.0
      context_length: 168

  timesfm1:
    script: experiments/timesfm1.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      context_length: 168

  timesfm2:
    script: experiments/timesfm2.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      context_length: 168

  timesfm25:
    script: experiments/timesfm2.5.py
    packages:
      - git+https://github.com/google-research/timesfm.git
    args:
      context_length: 168

  sundial:
    script: experiments/sundial.py
    packages:
      - transformers==4.40.1
    args:
      context_length: 168

  tirex:
    script: experiments/tirex_model.py
    packages:
      - tirex-ts
    args:
      context_length: 168

  toto:
    script: experiments/toto_model.py
    packages:
      - toto-ts
      # - setuptools==81.0.0
    args:
      context_length: 168

  visionts:
    script: experiments/visiontspp.py
    packages:
      - visionts
    args:
      context_length: 168

  seasonal_naive:
    script: experiments/seasonal_naive.py
    packages:
      - statsforecast
    args:
      context_length: 168

  kairos:
    script: experiments/kairos_model.py
    git_clone:
      url: https://github.com/foundation-model-research/Kairos.git
      dest: experiments/Kairos
    packages:
      - python-dotenv
      - pyarrow
      - huggingface-hub==0.30.0
      - transformers>=4.43
    args:
      context_length: 168

  # ttm:
  #   script: experiments/ttm.py
  #   packages:
  #     - granite-tsfm[notebooks]
  #     - torch
  #   args:
  #     model_path: ibm-granite/granite-timeseries-ttm-r2
  #     batch_size: 64
  #     context_length: 512

    
# Default datasets to run when no dataset= override is given
datasets:
  # - Water_Quality_Darwin/15T
  - CPCB/H
  # - SG_PM25/H
  # - EPA/H
  # - AURN/H
  # - CNEMC/H 

# Leaderboard settings
leaderboard:
  results_dir: output/results
  datasets:             # leave empty or omit to use all datasets in results_dir
    # - CPCB/H
    - SG_PM25/H
  metric: MASE          # sort by this metric
  air_pollution: true   # per-pollutant leaderboard instead of original overall leaderboard