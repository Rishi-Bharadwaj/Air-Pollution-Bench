# Paths relative to this file's location
time_repo: .                     # path to the TIME repo (contains experiments/)
data_dir: ./data/hf_dataset     # where converted HF Arrow datasets live (= TIME_DATASET)
datasets_config: datasets.yaml   # your dataset config (test/val/prediction lengths)

# Models and their dependencies
models:

  chronos_bolt:
    script: experiments/chronos_bolt.py
    packages:
      - chronos-forecasting
      - torch
    args:
      model_size: base
      batch_size: 16
      context_length: 2048

  chronos2:
    script: experiments/chronos2.py
    packages:
      - chronos-forecasting
      - torch
    args:
      model_size: base
      batch_size: 16
      context_length: 8192

  moirai:
    script: experiments/moirai.py
    packages:
      - uni2ts
    args:
      model_size: base
      batch_size: 16
      context_length: 4000

  moirai2:
    script: experiments/moirai2.py
    packages:
      - uni2ts
    args:
      model_size: small   # only size currently released for moirai-2.0
      batch_size: 16
      context_length: 4000

  timesfm1:
    script: experiments/timesfm1.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      batch_size: 32
      context_length: 512

  timesfm2:
    script: experiments/timesfm2.0.py
    packages:
      - timesfm[torch]<1.3.0
      - utilsforecast
    args:
      batch_size: 32
      context_length: 2048

  timesfm25:
    script: experiments/timesfm2.5.py
    packages:
      - git+https://github.com/google-research/timesfm.git
      - torch
    args:
      batch_size: 32
      context_length: 4096

  sundial:
    script: experiments/sundial.py
    packages:
      - transformers==4.40.1
      - torch
    args:
      batch_size: 16

  tirex:
    script: experiments/tirex_model.py
    packages:
      - tirex-ts
    args:
      batch_size: 16

  toto:
    script: experiments/toto_model.py
    packages:
      - toto-ts
      # - setuptools==81.0.0
    args:
      num_samples: 96
      samples_per_batch: 16

  visionts:
    script: experiments/visiontspp.py
    packages:
      - visionts
      - torch
    args:
      batch_size: 16

  seasonal_naive:
    script: experiments/seasonal_naive.py
    packages:
      - statsforecast

  kairos:
    script: experiments/kairos_model.py
    git_clone:
      url: https://github.com/foundation-model-research/Kairos.git
      dest: experiments/Kairos
    packages:
      - python-dotenv
      - pyarrow
    args:
      batch_size: 16

  ttm:
    script: experiments/ttm.py
    packages:
      - granite-tsfm[notebooks]
      - torch
    args:
      model_path: ibm-granite/granite-timeseries-ttm-r2
      batch_size: 64
      context_length: 512

    
# Default datasets to run when no dataset= override is given
datasets:
  # - Water_Quality_Darwin/15T
  - SG_PM25/H